name: WeChat buy/sell alerts

on:
  schedule:
    - cron: "*/10 1-3,5-7 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "Force alert check outside trading hours and ignore cooldown"
        type: boolean
        default: false
      dry_run:
        description: "Run without sending WeChat messages"
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: .alert-state
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-

      - name: Check buy/sell signals
        run: node scripts/wechat-alert.mjs
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          FORCE_ALERT: ${{ github.event_name == 'workflow_dispatch' && inputs.force || 'false' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .alert-state
          key: alert-state-${{ github.run_id }}
